<svg width="100%" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --text-color: #141413;
      --text-sub: #3d3d3a;
      --border-color: rgba(31, 30, 29, 0.3);
      --bg-header: #f5f4ed;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --text-color: #e0e0e0;
        --text-sub: #aaaaaa;
        --border-color: #555555;
        --bg-header: #2d2d2d;
      }
    }
    .dark :root {
      --text-color: #e0e0e0;
      --text-sub: #aaaaaa;
      --border-color: #555555;
      --bg-header: #2d2d2d;
    }
    text { font-family: sans-serif; fill: var(--text-color); }
    .sub-text { fill: var(--text-sub); font-size: 12px; }
    .header-bg { fill: var(--bg-header); stroke: var(--border-color); }
    line { stroke: var(--border-color); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- 標題列 -->
  <rect x="40" y="30" width="180" height="36" rx="6" class="header-bg" stroke-width="0.5"/>
  <text x="130" y="53" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500">比較項目</text>

  <rect x="240" y="30" width="180" height="36" rx="6" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
  <text x="330" y="53" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" style="fill:#3c3489">Claude Code</text>

  <rect x="440" y="30" width="200" height="36" rx="6" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
  <text x="540" y="53" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" style="fill:#085041">Gemini CLI</text>

  <!-- 分隔線 -->
  <line x1="40" y1="66" x2="640" y2="66" stroke-width="0.5"/>

  <!-- Row 1: 工具擴充方式 -->
  <rect x="40" y="72" width="180" height="52" rx="4" class="header-bg" stroke-width="0.5"/>
  <text x="130" y="98" text-anchor="middle" dominant-baseline="central" font-size="14">工具擴充方式</text>

  <rect x="240" y="72" width="180" height="52" rx="4" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
  <text x="330" y="90" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" style="fill:#3c3489">MCP</text>
  <text x="330" y="110" text-anchor="middle" dominant-baseline="central" class="sub-text">官方唯一支援方式</text>

  <rect x="440" y="72" width="200" height="52" rx="4" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
  <text x="540" y="90" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" style="fill:#085041">MCP</text>
  <text x="540" y="110" text-anchor="middle" dominant-baseline="central" class="sub-text">官方唯一支援方式</text>

  <!-- Row 2: function calling -->
  <rect x="40" y="130" width="180" height="52" rx="4" class="header-bg" stroke-width="0.5"/>
  <text x="130" y="156" text-anchor="middle" dominant-baseline="central" font-size="14">function calling 擴充</text>

  <rect x="240" y="130" width="180" height="52" rx="4" fill="#f1efe8" stroke="#5f5e5a" stroke-width="0.5"/>
  <text x="330" y="148" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" style="fill:#3d3d3a">不支援</text>
  <text x="330" y="168" text-anchor="middle" dominant-baseline="central" class="sub-text">無法直接注入工具</text>

  <rect x="440" y="130" width="200" height="52" rx="4" fill="#f1efe8" stroke="#5f5e5a" stroke-width="0.5"/>
  <text x="540" y="148" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" style="fill:#3d3d3a">不支援</text>
  <text x="540" y="168" text-anchor="middle" dominant-baseline="central" class="sub-text">無法直接注入工具</text>

  <!-- Row 3: function calling 發生在哪 -->
  <rect x="40" y="188" width="180" height="64" rx="4" class="header-bg" stroke-width="0.5"/>
  <text x="130" y="210" text-anchor="middle" dominant-baseline="central" font-size="14">function calling</text>
  <text x="130" y="228" text-anchor="middle" dominant-baseline="central" font-size="14">發生在哪</text>

  <rect x="240" y="188" width="180" height="64" rx="4" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
  <text x="330" y="206" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" style="fill:#3c3489">Agent 內部</text>
  <text x="330" y="224" text-anchor="middle" dominant-baseline="central" class="sub-text">Claude Code 自己的</text>
  <text x="330" y="240" text-anchor="middle" dominant-baseline="central" class="sub-text">內建工具（如 Bash）</text>

  <rect x="440" y="188" width="200" height="64" rx="4" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
  <text x="540" y="206" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" style="fill:#085041">Agent 內部</text>
  <text x="540" y="224" text-anchor="middle" dominant-baseline="central" class="sub-text">Gemini CLI 自己的</text>
  <text x="540" y="240" text-anchor="middle" dominant-baseline="central" class="sub-text">內建工具（如 shell）</text>

  <!-- Row 4: 開發者如何加工具 -->
  <rect x="40" y="258" width="180" height="64" rx="4" class="header-bg" stroke-width="0.5"/>
  <text x="130" y="280" text-anchor="middle" dominant-baseline="central" font-size="14">開發者加自訂</text>
  <text x="130" y="298" text-anchor="middle" dominant-baseline="central" font-size="14">工具的方式</text>

  <rect x="240" y="258" width="180" height="64" rx="4" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
  <text x="330" y="276" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" style="fill:#3c3489">寫 MCP Server</text>
  <text x="330" y="294" text-anchor="middle" dominant-baseline="central" class="sub-text">設定 claude_desktop</text>
  <text x="330" y="310" text-anchor="middle" dominant-baseline="central" class="sub-text">config.json 掛載</text>

  <rect x="440" y="258" width="200" height="64" rx="4" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
  <text x="540" y="276" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" style="fill:#085041">寫 MCP Server</text>
  <text x="540" y="294" text-anchor="middle" dominant-baseline="central" class="sub-text">設定 .gemini/settings</text>
  <text x="540" y="310" text-anchor="middle" dominant-baseline="central" class="sub-text">.json 掛載</text>

  <!-- Row 5: 用 API 自己做 -->
  <rect x="40" y="328" width="180" height="52" rx="4" class="header-bg" stroke-width="0.5"/>
  <text x="130" y="354" text-anchor="middle" dominant-baseline="central" font-size="14">用 API 自己做 Agent</text>

  <rect x="240" y="328" width="180" height="52" rx="4" fill="#faeeda" stroke="#854f0b" stroke-width="0.5"/>
  <text x="330" y="346" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" style="fill:#633806">完全支援</text>
  <text x="330" y="366" text-anchor="middle" dominant-baseline="central" class="sub-text">Anthropic API tool_use</text>

  <rect x="440" y="328" width="200" height="52" rx="4" fill="#faeeda" stroke="#854f0b" stroke-width="0.5"/>
  <text x="540" y="346" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" style="fill:#633806">完全支援</text>
  <text x="540" y="366" text-anchor="middle" dominant-baseline="central" class="sub-text">Gemini API functionDeclarations</text>
</svg>
